<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉语词汇 · Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080b10;
  --surface:#0e1219;
  --surface2:#141923;
  --border:#1e2a38;
  --border2:#2a3a50;
  --text:#e8edf5;
  --text2:#7a8fa8;
  --text3:#3d5068;
  --accent:#00c2ff;
  --accent2:#0077a8;
  --green:#00e5a0;
  --red:#ff4d6a;
  --gold:#ffd166;
  --r:10px;
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* animated bg grid */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,194,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,194,255,0.03) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
  z-index:0;
}
body::after{
  content:'';
  position:fixed;
  top:-40%;left:-20%;
  width:80vw;height:80vw;
  background:radial-gradient(circle,rgba(0,119,168,0.07) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  padding:32px 24px 24px;
  text-align:center;
  border-bottom:1px solid var(--border);
}
.logo{
  font-size:clamp(1.4rem,4vw,2rem);
  font-weight:800;
  letter-spacing:-0.01em;
  color:var(--text);
}
.logo span{
  color:var(--accent);
  font-family:'Noto Serif SC',serif;
}
.subtitle{
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;
  color:var(--text3);
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-top:6px;
}
.word-count-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,194,255,0.08);
  border:1px solid rgba(0,194,255,0.2);
  border-radius:20px;
  padding:4px 12px;
  font-family:'JetBrains Mono',monospace;
  font-size:0.62rem;
  color:var(--accent);
  letter-spacing:0.1em;
  margin-top:10px;
}
.dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

/* ── MAIN WRAP ── */
.wrap{
  position:relative;z-index:5;
  max-width:600px;
  margin:0 auto;
  padding:24px 16px 80px;
}

/* ── PROGRESS ── */
.progress-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.prog-label{
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;color:var(--text2);
  letter-spacing:0.08em;
}
.prog-score{
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;
  color:var(--accent);
  letter-spacing:0.08em;
}
.progress-track{
  height:3px;
  background:var(--border);
  border-radius:2px;
  overflow:hidden;
  margin-bottom:20px;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:2px;
  transition:width 0.5s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.progress-fill::after{
  content:'';
  position:absolute;right:0;top:-2px;
  width:8px;height:7px;
  background:var(--accent);
  border-radius:50%;
  box-shadow:0 0 8px var(--accent);
}

/* ── QUESTION CARD ── */
.q-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:32px 24px 28px;
  position:relative;
  overflow:hidden;
  animation:cardSlide 0.35s cubic-bezier(.4,0,.2,1);
}
@keyframes cardSlide{
  from{opacity:0;transform:translateY(18px) scale(0.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.q-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0.6;
}

.q-type-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--accent);
  background:rgba(0,194,255,0.07);
  border:1px solid rgba(0,194,255,0.18);
  border-radius:4px;
  padding:4px 10px;
  margin-bottom:22px;
}
.q-type-tag .arrow{font-size:0.7rem}

.q-counter{
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;color:var(--text3);
  letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:18px;
}

.q-prompt-wrap{
  min-height:90px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
}
.q-prompt{
  text-align:center;
  line-height:1.15;
  transition:all 0.2s;
}
.q-prompt.type-hanzi{
  font-family:'Noto Serif SC',serif;
  font-size:clamp(2.8rem,10vw,4.2rem);
  font-weight:700;
  color:var(--text);
  text-shadow:0 0 40px rgba(0,194,255,0.15);
}
.q-prompt.type-pinyin{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(1.4rem,5vw,2rem);
  font-weight:500;
  color:var(--accent);
  letter-spacing:0.04em;
}
.q-prompt.type-id{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.2rem,4.5vw,1.8rem);
  font-weight:600;
  color:var(--gold);
}

.q-hint{
  text-align:center;
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;color:var(--text3);
  letter-spacing:0.08em;
  margin-bottom:24px;
}

/* ── OPTIONS ── */
.options-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.opt{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px 12px;
  cursor:pointer;
  font-family:'Syne',sans-serif;
  font-size:0.82rem;
  color:var(--text);
  text-align:center;
  transition:all 0.15s;
  min-height:64px;
  display:flex;align-items:center;justify-content:center;
  line-height:1.3;
  position:relative;
  overflow:hidden;
}
.opt::before{
  content:'';
  position:absolute;inset:0;
  background:rgba(0,194,255,0);
  transition:background 0.15s;
}
.opt:hover:not(:disabled)::before{background:rgba(0,194,255,0.05)}
.opt:hover:not(:disabled){border-color:var(--border2);transform:translateY(-1px)}
.opt .hanzi-opt{
  font-family:'Noto Serif SC',serif;
  font-size:1.25rem;
  font-weight:700;
  display:block;
}
.opt .pinyin-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;
  color:var(--text3);
  display:block;
  margin-top:2px;
}
.opt:disabled{cursor:default}

.opt.correct{
  border-color:var(--green);
  background:rgba(0,229,160,0.1);
  color:var(--green);
}
.opt.correct .hanzi-opt{color:var(--green)}
.opt.correct::after{
  content:'✓';
  position:absolute;top:6px;right:8px;
  font-size:0.7rem;color:var(--green);
}
.opt.wrong{
  border-color:var(--red);
  background:rgba(255,77,106,0.08);
  color:var(--red);
}
.opt.wrong .hanzi-opt{color:var(--red)}
.opt.wrong::after{
  content:'✗';
  position:absolute;top:6px;right:8px;
  font-size:0.7rem;color:var(--red);
}

/* ── FEEDBACK ── */
.feedback{
  margin-top:16px;
  padding:14px 16px;
  border-radius:8px;
  font-size:0.78rem;
  line-height:1.7;
  display:none;
}
.feedback.show{display:block;animation:fadeUp 0.25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.feedback.fb-correct{
  background:rgba(0,229,160,0.07);
  border:1px solid rgba(0,229,160,0.25);
  color:var(--green);
}
.feedback.fb-wrong{
  background:rgba(255,77,106,0.07);
  border:1px solid rgba(255,77,106,0.2);
  color:var(--red);
}
.feedback strong{font-weight:600}
.feedback .entry-detail{
  margin-top:6px;
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;
  opacity:0.75;
  color:var(--text2);
}
.feedback .entry-detail span{color:var(--accent)}

/* ── NEXT BUTTON ── */
.next-btn{
  display:none;
  width:100%;
  margin-top:12px;
  padding:14px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#000;
  border:none;
  border-radius:8px;
  font-family:'Syne',sans-serif;
  font-size:0.78rem;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.15s;
}
.next-btn.show{display:block;animation:fadeUp 0.25s ease}
.next-btn:hover{transform:translateY(-1px);box-shadow:0 4px 24px rgba(0,194,255,0.3)}
.next-btn:active{transform:translateY(0)}

/* ── SCORE SCREEN ── */
.score-screen{
  display:none;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:40px 24px;
  text-align:center;
  animation:cardSlide 0.4s ease;
  position:relative;overflow:hidden;
}
.score-screen::before{
  content:'';
  position:absolute;top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.score-screen.show{display:block}

.score-label{
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:8px;
}
.score-big{
  font-family:'Noto Serif SC',serif;
  font-size:5.5rem;font-weight:700;
  line-height:1;
  background:linear-gradient(135deg,var(--gold),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin:4px 0 18px;
}
.score-pct{
  font-family:'JetBrains Mono',monospace;
  font-size:0.75rem;color:var(--text2);
  letter-spacing:0.1em;
  margin-bottom:20px;
}

.stats-row{
  display:flex;justify-content:center;gap:32px;
  margin-bottom:24px;
}
.stat-item{text-align:center}
.stat-val{
  font-family:'Syne',sans-serif;
  font-size:1.8rem;font-weight:800;
  line-height:1;margin-bottom:4px;
}
.stat-val.sv-green{color:var(--green)}
.stat-val.sv-red{color:var(--red)}
.stat-lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:0.58rem;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--text3);
}

.score-msg{
  font-size:1rem;font-weight:600;
  color:var(--text);margin-bottom:28px;
}

.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.sc-btn{
  padding:12px 24px;
  border-radius:8px;
  font-family:'Syne',sans-serif;
  font-size:0.75rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all 0.15s;
  border:none;
}
.sc-btn.primary{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#000;
}
.sc-btn.primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,194,255,0.3)}
.sc-btn.ghost{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--text2);
}
.sc-btn.ghost:hover{border-color:var(--accent);color:var(--accent)}

/* ── STREAK ── */
.streak-bar{
  display:flex;gap:4px;justify-content:center;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.streak-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--border2);
  transition:all 0.3s;
}
.streak-dot.win{background:var(--green);box-shadow:0 0 6px rgba(0,229,160,0.5)}
.streak-dot.lose{background:var(--red);box-shadow:0 0 6px rgba(255,77,106,0.3)}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<header>
  <div class="logo"><span>汉语词汇</span> Quiz</div>
  <div class="subtitle">Mandarin Vocabulary · Fully Randomized</div>
  <div class="word-count-badge">
    <div class="dot"></div>
    78 WORDS · 3 QUESTION TYPES
  </div>
</header>

<div class="wrap">
  <div class="progress-row">
    <div class="prog-label" id="prog-label">Q 1 / 10</div>
    <div class="prog-score" id="prog-score">0 pts</div>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="prog-fill" style="width:0%"></div>
  </div>

  <div class="streak-bar" id="streak-bar"></div>

  <!-- QUESTION CARD -->
  <div class="q-card" id="q-card">
    <div class="q-type-tag" id="q-type-tag">
      <span id="tag-text">Loading</span>
    </div>
    <div class="q-counter" id="q-counter">QUESTION 1</div>
    <div class="q-prompt-wrap">
      <div class="q-prompt" id="q-prompt">—</div>
    </div>
    <div class="q-hint" id="q-hint">—</div>
    <div class="options-grid" id="opts"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="next()">Continue →</button>
  </div>

  <!-- SCORE SCREEN -->
  <div class="score-screen" id="score-screen">
    <div class="score-label">Session Complete</div>
    <div class="score-big" id="sc-big">—</div>
    <div class="score-pct" id="sc-pct">—</div>
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-val sv-green" id="sc-correct">0</div>
        <div class="stat-lbl">Correct</div>
      </div>
      <div class="stat-item">
        <div class="stat-val sv-red" id="sc-wrong">0</div>
        <div class="stat-lbl">Wrong</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="sc-streak" style="color:var(--gold)">0</div>
        <div class="stat-lbl">Best Streak</div>
      </div>
    </div>
    <div class="score-msg" id="sc-msg">Keep it up!</div>
    <div class="btn-row">
      <button class="sc-btn primary" onclick="restart()">↺ Play Again</button>
    </div>
  </div>
</div>

// ── STATE ──────────────────────────────────────────────────────────────
const TOTAL = 10;
const TYPES = ['pinyin→hanzi','hanzi→id','id→hanzi'];

let qs=[], cur=0, score=0, streak=0, bestStreak=0, history=[], answered=false;

function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

function buildQuestions(){
  const pool=shuffle(VOCAB).slice(0,TOTAL);
  qs=pool.map(w=>({
    word:w,
    type:TYPES[Math.floor(Math.random()*TYPES.length)]
  }));
}

function render(){
  const {word,type}=qs[cur];
  answered=false;

  // progress
  document.getElementById('prog-label').textContent=`Q ${cur+1} / ${TOTAL}`;
  document.getElementById('prog-score').textContent=`${score} pts`;
  document.getElementById('prog-fill').style.width=`${(cur/TOTAL)*100}%`;

  // streak bar
  const sb=document.getElementById('streak-bar');
  sb.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='streak-dot'+(history[i]==='win'?' win':history[i]==='lose'?' lose':'');
    sb.appendChild(d);
  }

  // type tag + prompt
  let tagText,promptText,promptClass,hint,wrongPool,getLabel,correctLabel;

  if(type==='pinyin→hanzi'){
    tagText='拼音 → 汉字';
    promptText=word.p;
    promptClass='type-pinyin';
    hint='Select the correct Hanzi character(s)';
    wrongPool=VOCAB.filter(v=>v.h!==word.h);
    getLabel=v=>`<span class="hanzi-opt">${v.h}</span>`;
    correctLabel=word.h;
  } else if(type==='hanzi→id'){
    tagText='汉字 → Bahasa Indonesia';
    promptText=word.h;
    promptClass='type-hanzi';
    hint='Pilih arti yang benar dalam Bahasa Indonesia';
    wrongPool=VOCAB.filter(v=>v.h!==word.h);
    getLabel=v=>v.id;
    correctLabel=word.id;
  } else {
    tagText='Indonesia → 汉字';
    promptText=word.id;
    promptClass='type-id';
    hint='Pilih Hanzi yang benar';
    wrongPool=VOCAB.filter(v=>v.h!==word.h);
    getLabel=v=>`<span class="hanzi-opt">${v.h}</span>`;
    correctLabel=word.h;
  }

  document.getElementById('tag-text').textContent=tagText;
  document.getElementById('q-counter').textContent=`QUESTION ${cur+1} OF ${TOTAL}`;

  const pEl=document.getElementById('q-prompt');
  pEl.className='q-prompt '+promptClass;
  pEl.textContent='';
  // for hanzi prompt we use textContent, others too
  if(promptClass==='type-hanzi'){
    pEl.innerHTML=`<span style="font-family:'Noto Serif SC',serif">${promptText}</span>`;
  } else {
    pEl.textContent=promptText;
  }

  document.getElementById('q-hint').textContent=hint;

  // build 4 choices
  const wrongs=shuffle(wrongPool).slice(0,3);
  const choices=shuffle([word,...wrongs]);

  const grid=document.getElementById('opts');
  grid.innerHTML='';
  choices.forEach(c=>{
    const label = type==='pinyin→hanzi'||type==='id→hanzi'
      ? `<span class="hanzi-opt">${c.h}</span>`
      : c.id;
    const val = type==='pinyin→hanzi'||type==='id→hanzi' ? c.h : c.id;

    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=label;
    btn.dataset.val=val;
    btn.onclick=()=>pick(btn,val,correctLabel,word,type);
    grid.appendChild(btn);
  });

  // reset feedback & next
  const fb=document.getElementById('feedback');
  fb.className='feedback';
  document.getElementById('next-btn').className='next-btn';
}

function pick(btn,chosen,correct,word,type){
  if(answered)return;
  answered=true;

  const isRight=chosen===correct;
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===correct)b.classList.add('correct');
    else if(b===btn&&!isRight)b.classList.add('wrong');
  });

  if(isRight){score++;streak++;bestStreak=Math.max(bestStreak,streak);history[cur]='win';}
  else{streak=0;history[cur]='lose';}

  document.getElementById('prog-score').textContent=`${score} pts`;

  // feedback
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(isRight?'fb-correct':'fb-wrong');
  fb.innerHTML=`
    <strong>${isRight?'✓ Correct!':'✗ Wrong'}</strong>
    <div class="entry-detail">
      <span>${word.h}</span> · ${word.p} · ${word.id}
    </div>
  `;

  // update streak dots
  const dots=document.querySelectorAll('.streak-dot');
  dots[cur].className='streak-dot '+(isRight?'win':'lose');

  document.getElementById('next-btn').className='next-btn show';
}

function next(){
  cur++;
  if(cur>=TOTAL){showScore();return;}
  const card=document.getElementById('q-card');
  card.style.animation='none';
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{card.style.animation='';render();});
  });
}

function showScore(){
  document.getElementById('q-card').style.display='none';
  const pct=Math.round(score/TOTAL*100);
  document.getElementById('sc-big').textContent=`${score}/${TOTAL}`;
  document.getElementById('sc-pct').textContent=`${pct}% accuracy`;
  document.getElementById('sc-correct').textContent=score;
  document.getElementById('sc-wrong').textContent=TOTAL-score;
  document.getElementById('sc-streak').textContent=bestStreak;

  let msg='Keep practising! 加油！💪';
  if(pct===100)msg='Perfect score! 太棒了！🎉 You crushed it!';
  else if(pct>=80)msg='Excellent! 很好！You really know these words.';
  else if(pct>=60)msg='Not bad! 还不错！Keep going.';
  else if(pct>=40)msg='A good start. Review the words and try again!';

  document.getElementById('sc-msg').textContent=msg;
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('score-screen').className='score-screen show';
}

function restart(){
  cur=0;score=0;streak=0;bestStreak=0;history=[];
  document.getElementById('q-card').style.display='block';
  document.getElementById('score-screen').className='score-screen';
  buildQuestions();
  render();
}

// ── INIT ──
buildQuestions();
render();
</script>
